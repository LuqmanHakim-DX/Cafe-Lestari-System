<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aneka Mee - Lestari Cafe</title>
    <!-- CSS di luar folder screens -->
    <link rel="stylesheet" href="../stylesheet.css">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="home-header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h1 class="logo-text">Lestari Cafe</h1>
        <div class="header-icons">
            <i class="fas fa-shopping-cart"></i>
            <i class="fas fa-user"></i>
        </div>
    </header>

    <div class="content-container">
        <div class="nav-section">
            <h2>Aneka Mee</h2>
            <p>Pilih lauk kegemaran anda</p>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
    <!-- Mee Hailam -->
    <div class="menu-card">
        <img src="../assets/mee-hailam.jpg" alt="Mee Hailam" class="card-img">
        <div class="card-text">
            <h4>Mee Hailam</h4>
            <p>RM6.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Mee Sup -->
    <div class="menu-card">
        <img src="../assets/mee-sup.jpg" alt="Mee Sup" class="card-img">
        <div class="card-text">
            <h4>Mee Sup</h4>
            <p>RM6.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Mee Goreng -->
    <div class="menu-card">
        <img src="../assets/mee-goreng.jpg" alt="Mee Goreng" class="card-img">
        <div class="card-text">
            <h4>Mee Goreng</h4>
            <p>RM6.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Kuew teow kungfu -->
    <div class="menu-card">
        <img src="../assets/kuew-teow-kungfu.jpg" alt="Kuew Teow Kungfu" class="card-img">
        <div class="card-text">
            <h4>Kuew Teow Kungfu</h4>
            <p>RM6.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>
</div>

        </div>
    </div>

</body>
</html>
