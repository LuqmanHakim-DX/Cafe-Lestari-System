<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu - Lestari Cafe</title>
    <link rel="stylesheet" href="../stylesheet.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#d97b29">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#d97b29">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #555;
        }

        .manage-menu-page {
            max-width: 980px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            color: #333;
        }

        .manage-menu-card {
            background: #f3f3f3;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        .manage-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .manage-menu-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .manage-menu-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .manage-menu-form {
            display: grid;
            gap: 12px;
        }

        .manage-menu-form input,
        .manage-menu-form textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .manage-menu-form textarea {
            min-height: 90px;
            resize: vertical;
        }

        .menu-item-list {
            display: grid;
            gap: 12px;
        }

        .menu-item-row {
            background: white;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .menu-item-row strong {
            display: block;
            margin-bottom: 4px;
        }

        .menu-item-meta {
            color: #666;
            font-size: 0.95rem;
        }

        .menu-item-price {
            font-weight: 700;
            color: #333;
        }

        .menu-item-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
            color: white;
            background: #333;
        }

        .icon-btn.remove {
            background: #e74c3c;
        }

        .icon-btn.edit {
            background: #2980b9;
        }

        .manage-menu-actions .login-btn,
        .manage-menu-actions .logout-btn {
            margin-top: 0;
            width: auto;
            padding: 12px 16px;
        }

        @media (max-width: 768px) {
            .menu-item-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .manage-menu-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="homepage-body">
    <div class="manage-menu-page">
        <div class="manage-menu-card">
            <div class="manage-menu-header">
                <h2>Manage Menu</h2>
                <div class="manage-menu-actions">
                    <button class="order-now-btn" onclick="window.location.href='menu.html'">View Menu</button>
                    <button class="logout-btn" onclick="window.location.href='admin.html'" style="margin-top: 0; width: auto; padding: 12px 16px;">Back to Admin</button>
                </div>
            </div>

            <form id="menu-form" class="manage-menu-form">
                <input id="item-name" type="text" placeholder="Item name" required>
                <input id="item-price" type="number" step="0.01" min="0" placeholder="Price (RM)" required>
                <textarea id="item-description" placeholder="Short description"></textarea>
                <div class="manage-menu-actions" style="justify-content:flex-start; margin-top:4px;">
                    <button id="menu-submit-btn" class="login-btn" type="submit">Add Item</button>
                    <button id="cancel-edit-btn" class="logout-btn" type="button" style="display:none;">Cancel Edit</button>
                </div>
            </form>
        </div>

        <div class="manage-menu-card">
            <h3 style="margin-top: 0;">Current Menu</h3>
            <div id="menu-list" class="menu-item-list"></div>
        </div>
    </div>

    <script>
        const MENU_KEY = 'lestariMenuItems';
        let editingIndex = null;
        const defaultMenu = [
            { name: 'Nasi Goreng Kampung', price: 5.00, description: 'Fried rice with egg, chicken, and sambal.' },
            { name: 'Mee Goreng', price: 4.00, description: 'Classic stir-fried noodles with vegetables.' },
            { name: 'Nasi Lemak', price: 4.50, description: 'Coconut rice served with sambal and egg.' },
            { name: 'Teh Tarik', price: 2.50, description: 'Creamy milk tea pulled to perfection.' }
        ];

        function getMenuItems() {
            const saved = localStorage.getItem(MENU_KEY);
            if (!saved) {
                localStorage.setItem(MENU_KEY, JSON.stringify(defaultMenu));
                return defaultMenu;
            }

            try {
                const parsed = JSON.parse(saved);
                return Array.isArray(parsed) && parsed.length ? parsed : defaultMenu;
            } catch (error) {
                console.error('Unable to parse menu items', error);
                return defaultMenu;
            }
        }

        function saveMenuItems(items) {
            localStorage.setItem(MENU_KEY, JSON.stringify(items));
        }

        function resetMenuForm() {
            document.getElementById('menu-form').reset();
            document.getElementById('menu-submit-btn').textContent = 'Add Item';
            document.getElementById('cancel-edit-btn').style.display = 'none';
        }

        function renderMenuItems() {
            const items = getMenuItems();
            const list = document.getElementById('menu-list');

            if (!list) return;

            if (!items.length) {
                list.innerHTML = '<p class="empty-cart">No items on the menu yet.</p>';
                return;
            }

            list.innerHTML = items.map((item, index) => `
                <div class="menu-item-row">
                    <div>
                        <strong>${item.name}</strong>
                        <div class="menu-item-meta">${item.description || 'No description added.'}</div>
                    </div>
                    <div class="menu-item-actions">
                        <span class="menu-item-price">RM ${Number(item.price).toFixed(2)}</span>
                        <button class="icon-btn edit" type="button" onclick="startEditMenuItem(${index})">Edit</button>
                        <button class="icon-btn remove" type="button" onclick="removeMenuItem(${index})">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        function startEditMenuItem(index) {
            const items = getMenuItems();
            const item = items[index];
            if (!item) return;

            editingIndex = index;
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-price').value = item.price;
            document.getElementById('item-description').value = item.description || '';
            document.getElementById('menu-submit-btn').textContent = 'Save Changes';
            document.getElementById('cancel-edit-btn').style.display = 'inline-block';
            document.getElementById('item-name').focus();
        }

        function cancelEditMenuItem() {
            editingIndex = null;
            resetMenuForm();
        }

        function removeMenuItem(index) {
            const items = getMenuItems();
            if (confirm('Remove this menu item?')) {
                items.splice(index, 1);
                if (editingIndex !== null && editingIndex >= items.length) {
                    editingIndex = null;
                }
                saveMenuItems(items);
                renderMenuItems();
                if (editingIndex === null) {
                    resetMenuForm();
                }
            }
        }

        document.getElementById('menu-form').addEventListener('submit', function (event) {
            event.preventDefault();

            const name = document.getElementById('item-name').value.trim();
            const price = parseFloat(document.getElementById('item-price').value);
            const description = document.getElementById('item-description').value.trim();

            if (!name || isNaN(price)) {
                alert('Please enter a valid item name and price.');
                return;
            }

            const items = getMenuItems();
            if (editingIndex !== null && items[editingIndex]) {
                items[editingIndex] = { ...items[editingIndex], name, price, description };
                alert(`${name} updated in the menu.`);
            } else {
                items.push({ name, price, description });
                alert(`${name} added to the menu.`);
            }

            editingIndex = null;
            saveMenuItems(items);
            renderMenuItems();
            resetMenuForm();
        });

        document.getElementById('cancel-edit-btn').addEventListener('click', cancelEditMenuItem);

        window.addEventListener('load', () => {
            renderMenuItems();
            resetMenuForm();
        });
    </script>
</body>
</html>
