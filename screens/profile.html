<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Lestari Cafe</title>
    <link rel="stylesheet" href="..\/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="homepage-body">

    <div class="sidebar">
        <h3 class="sidebar-title">menu</h3>
        <nav class="nav-links">
            <a href="homepage.html" class="nav-item">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="menu.html" class="nav-item">
                <i class="fas fa-utensils"></i> Menu
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i> Profile
            </a>
            <a href="settings.html" class="nav-item active">
                <i class="fas fa-cog"></i> Settings
            </a>
            <a href="help.html" class="nav-item">
                <i class="fas fa-question-circle"></i> Help
            </a>
            <hr>
            <a href="login.html" class="nav-item logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </div>

    <header class="page-header">
        <i class="fas fa-bars" id="menu-toggle" style="cursor:pointer;"></i>
        <h1>Profile</h1>
        <div class="header-icons">
            <i class="fas fa-home" onclick="window.location.href='homepage.html'"></i>
            <a href="checkout.html" class="icon-button">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="cart-badge">0</span>
            </a>
        </div>
    </header>

    <div class="page-content profile-page">
        <section class="profile-card">
            <div class="profile-avatar" id="userAvatar">A</div>
            <h2 id="userName">Loading...</h2>
            <p class="profile-email" id="userEmail">Loading...</p>
        </section>

        <section class="profile-details">
            <h2>Account</h2>
            <div class="profile-item">
                <strong>Email:</strong> <span id="detailEmail">Loading...</span>
            </div>
            <div class="profile-item">
                <strong>User ID:</strong> <span id="detailUid">Loading...</span>
            </div>
            <div class="profile-item">
                <strong>Role:</strong> <span id="detailRole">Loading...</span>
            </div>
            <div class="profile-item">
                <strong>Account Created:</strong> <span id="detailCreated">Loading...</span>
            </div>
        </section>

        <section class="profile-actions">
            <button class="order-now-btn" onclick="window.location.href='menu.html'">Browse Menu</button>
            <button class="logout-btn" id="logoutBtn">Logout</button>
            <button class="order-now-btn" id="adminDashboardBtn" style="display:none; margin-left:8px;">Go to Admin Dashboard</button>
        </section>
    </div>

    <script type="module">
        import { auth, db } from "../firebase-config.js";
        import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const CART_KEY = 'lestariCart';

        // Check if user is authenticated
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is logged in
                displayUserProfile(user);
            } else {
                // User is not logged in, redirect to login
                window.location.href = 'login.html';
            }
        });

        async function displayUserProfile(user) {
            const email = user.email;
            const displayName = user.displayName || email.split('@')[0]; // Use display name or extract from email
            const uid = user.uid;
            const createdAt = new Date(user.metadata.creationTime).toLocaleDateString();

            // Update avatar with first letter of display name
            const firstLetter = displayName.charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = firstLetter;
            document.getElementById('userAvatar').style.backgroundColor = getColorForLetter(firstLetter);

            // Update profile information
            document.getElementById('userName').textContent = displayName;
            document.getElementById('userEmail').textContent = email;
            document.getElementById('detailEmail').textContent = email;
            document.getElementById('detailUid').textContent = uid.substring(0, 16) + '...';
            document.getElementById('detailCreated').textContent = createdAt;

            // Attempt to read role from Firestore, fallback to localStorage
            let role = 'user';
            try {
                const userDoc = await getDoc(doc(db, 'users', uid));
                if (userDoc.exists()) {
                    role = userDoc.data().role || 'user';
                } else {
                    // try lookup by email
                    const emailDoc = await getDoc(doc(db, 'users', email));
                    if (emailDoc && emailDoc.exists()) role = emailDoc.data().role || 'user';
                }
            } catch (e) {
                try { const roles = JSON.parse(localStorage.getItem('userRoles') || '{}'); role = roles[uid] || roles[email] || 'user'; } catch (err) { role = 'user'; }
            }

            document.getElementById('detailRole').textContent = role;

            // Show admin dashboard button for admins
            if (role === 'admin') {
                const btn = document.getElementById('adminDashboardBtn');
                btn.style.display = 'inline-block';
                btn.addEventListener('click', () => window.location.href = 'admin.html');
            }

            // Update cart count
            updateCount();
        }

        function getColorForLetter(letter) {
            const colors = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
                '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B', '#ABEBC6'
            ];
            const charCode = letter.charCodeAt(0);
            return colors[charCode % colors.length];
        }

        function getCart() {
            const saved = localStorage.getItem(CART_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function updateCount() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await signOut(auth);
                console.log('User logged out');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error logging out:', error);
                alert('Error logging out. Please try again.');
            }
        });

        window.addEventListener('load', updateCount);
    </script>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.querySelector('.sidebar');

        if (menuToggle && sidebar) {
            menuToggle.addEventListener('click', (e) => {
                sidebar.classList.toggle('active');
                e.stopPropagation();
            });

            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                }
            });
        }
    </script>
</body>
</html>
