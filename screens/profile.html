<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Lestari Cafe</title>
    <link rel="stylesheet" href="..\/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="homepage-body">

    <header class="page-header">
        <i class="fas fa-chevron-left" onclick="window.location.href='homepage.html'"></i>
        <h1>Profile</h1>
        <div class="header-icons">
            <i class="fas fa-home" onclick="window.location.href='homepage.html'"></i>
            <a href="checkout.html" class="icon-button">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="cart-badge">0</span>
            </a>
        </div>
    </header>

    <div class="page-content profile-page">
        <section class="profile-card">
            <div class="profile-avatar">A</div>
            <h2>Adam</h2>
            <p class="profile-email">adam@gmail.com</p>
        </section>

        <section class="profile-details">
            <h2>Account</h2>
            <div class="profile-item">Membership: Regular</div>
            <div class="profile-item">Saved Address: No. 12, Kuala Lumpur</div>
            <div class="profile-item">Rewards Points: 120</div>
        </section>

        <section class="profile-actions">
            <button class="order-now-btn" onclick="window.location.href='menu.html'">Browse Menu</button>
        </section>
    </div>

    <script>
        const CART_KEY = 'lestariCart';

        function getCart() {
            const saved = localStorage.getItem(CART_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function updateCount() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        window.addEventListener('load', updateCount);
    </script>

</body>
</html>
