<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Lestari Cafe</title>
    <link rel="stylesheet" href="..\/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="homepage-body">

    <header class="page-header">
        <i class="fas fa-chevron-left" onclick="window.location.href='homepage.html'"></i>
        <h1>Profile</h1>
        <div class="header-icons">
            <i class="fas fa-home" onclick="window.location.href='homepage.html'"></i>
            <a href="checkout.html" class="icon-button">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="cart-badge">0</span>
            </a>
        </div>
    </header>

    <div class="page-content profile-page">
        <section class="profile-card">
            <div class="profile-avatar" id="userAvatar">A</div>
            <h2 id="userName">Loading...</h2>
            <p class="profile-email" id="userEmail">Loading...</p>
        </section>

        <section class="profile-details">
            <h2>Account</h2>
            <div class="profile-item">
                <strong>Email:</strong> <span id="detailEmail">Loading...</span>
            </div>
            <div class="profile-item">
                <strong>User ID:</strong> <span id="detailUid">Loading...</span>
            </div>
            <div class="profile-item">
                <strong>Account Created:</strong> <span id="detailCreated">Loading...</span>
            </div>
        </section>

        <section class="profile-actions">
            <button class="order-now-btn" onclick="window.location.href='menu.html'">Browse Menu</button>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </section>
    </div>

    <script type="module">
        import { auth } from "../firebase-config.js";
        import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const CART_KEY = 'lestariCart';

        // Check if user is authenticated
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is logged in
                displayUserProfile(user);
            } else {
                // User is not logged in, redirect to login
                window.location.href = 'login.html';
            }
        });

        function displayUserProfile(user) {
            const email = user.email;
            const displayName = user.displayName || email.split('@')[0]; // Use display name or extract from email
            const uid = user.uid;
            const createdAt = new Date(user.metadata.creationTime).toLocaleDateString();

            // Update avatar with first letter of display name
            const firstLetter = displayName.charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = firstLetter;
            document.getElementById('userAvatar').style.backgroundColor = getColorForLetter(firstLetter);

            // Update profile information
            document.getElementById('userName').textContent = displayName;
            document.getElementById('userEmail').textContent = email;
            document.getElementById('detailEmail').textContent = email;
            document.getElementById('detailUid').textContent = uid.substring(0, 16) + '...';
            document.getElementById('detailCreated').textContent = createdAt;

            // Update cart count
            updateCount();
        }

        function getColorForLetter(letter) {
            const colors = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
                '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B', '#ABEBC6'
            ];
            const charCode = letter.charCodeAt(0);
            return colors[charCode % colors.length];
        }

        function getCart() {
            const saved = localStorage.getItem(CART_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function updateCount() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await signOut(auth);
                console.log('User logged out');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error logging out:', error);
                alert('Error logging out. Please try again.');
            }
        });

        window.addEventListener('load', updateCount);
    </script>

</body>
</html>
