<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Lestari Cafe</title>
    <link rel="stylesheet" href="..\/stylesheet.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="auth-tabs">
            <a href="login.html" class="tab-btn">Log In</a>
            <a href="signup.html" class="tab-btn active">Sign Up</a>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <input type="email" id="signupEmail" placeholder="Email address" required>
            </div>
            <div class="form-group">
                <input type="text" id="signupName" placeholder="Full name" required>
            </div>
            <div class="form-group">
                <input type="tel" id="signupPhone" placeholder="Phone number (optional)">
            </div>
            <div class="form-group">
                <input type="password" id="signupPassword" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>
            
            <button type="submit" class="login-btn">Sign Up</button>
            <div id="signupError" style="color: red; margin-top: 10px; display: none;"></div>
        </form>
    </div>

    <script type="module">
        import { auth, db } from "../firebase-config.js";
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const signupForm = document.getElementById("signupForm");
        const signupError = document.getElementById("signupError");

        signupForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("signupEmail").value;
            const password = document.getElementById("signupPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            // Validate passwords match
            if (password !== confirmPassword) {
                signupError.style.display = "block";
                signupError.textContent = "Passwords do not match.";
                return;
            }

            // Validate password strength
            if (password.length < 6) {
                signupError.style.display = "block";
                signupError.textContent = "Password must be at least 6 characters long.";
                return;
            }

            try {
                signupError.style.display = "none";
                signupError.textContent = "";

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                console.log("User created:", userCredential.user);

                // Persist basic user data and default role to Firestore
                const fullName = document.getElementById('signupName').value.trim();
                const phone = document.getElementById('signupPhone').value.trim();
                try {
                    await setDoc(doc(db, 'users', userCredential.user.uid), {
                        email: email,
                        name: fullName || null,
                        phone: phone || null,
                        role: 'user',
                        createdAt: serverTimestamp()
                    });
                } catch (e) {
                    console.error('Failed to write user to Firestore:', e);
                }

                // Redirect to verification page on successful signup
                window.location.href = "verification.html";
            } catch (error) {
                console.error("Signup error:", error.code, error.message);
                signupError.style.display = "block";
                
                // Provide user-friendly error messages
                if (error.code === "auth/invalid-email") {
                    signupError.textContent = "Invalid email address.";
                } else if (error.code === "auth/email-already-in-use") {
                    signupError.textContent = "This email is already registered. Try logging in.";
                } else if (error.code === "auth/weak-password") {
                    signupError.textContent = "Password is too weak. Use a stronger password.";
                } else if (error.code === "auth/operation-not-allowed") {
                    signupError.textContent = "Sign up is currently disabled.";
                } else {
                    signupError.textContent = "Sign up failed: " + error.message;
                }
            }
        });
    </script>

</body>
</html>
