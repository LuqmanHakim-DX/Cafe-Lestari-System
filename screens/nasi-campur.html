<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasi Campur - Lestari Cafe</title>
    <!-- CSS di luar folder screens -->
    <link rel="stylesheet" href="../stylesheet.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#d97b29">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <h3 class="sidebar-title">menu</h3>
        <nav class="nav-links">
            <a href="menu.html" class="nav-item">
                <i class="fas fa-utensils"></i> Menu
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i> Profile
            </a>
            <a href="settings.html" class="nav-item active">
                <i class="fas fa-cog"></i> Settings
            </a>
            <a href="help.html" class="nav-item">
                <i class="fas fa-question-circle"></i> Help
            </a>
            <hr>
            <a href="login.html" class="nav-item logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </div>

    <!-- Header -->
    <header class="home-header">
        <i class="fas fa-bars" id="menu-toggle" style="cursor:pointer;"></i>
        <h1 class="logo-text">Lestari Cafe</h1>
        <div class="header-icons">
    <a href="checkout.html" class="icon-button">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count" class="cart-badge">0</span>
    </a>
    <i class="fas fa-user" onclick="window.location.href='profile.html'"></i>
</div>
    </header>

    <div class="content-container">
        <div class="nav-section">
            <h2>Nasi Campur</h2>
            <p>Pilih lauk kegemaran anda</p>
        </div>

        <!-- Menu Grid -->
        <div id="menu-grid" class="menu-grid"></div>

        </div>
    </div>
  <script>
        const CART_KEY = 'lestariCart';
        const MENU_KEY = 'lestariMenuItems';
        const CATEGORY = 'Nasi Campur';

        function getCart() {
            const saved = localStorage.getItem(CART_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }

        function inferMenuCategory(name) {
            const loweredName = (name || '').toLowerCase();
            if (loweredName.includes('teh') || loweredName.includes('kopi') || loweredName.includes('milo')) {
                return 'Minuman';
            }
            if (loweredName.includes('mee')) {
                return 'Aneka Mee';
            }
            if (loweredName.includes('ayam') || loweredName.includes('campur') || loweredName.includes('tomyam')) {
                return 'Nasi Campur';
            }
            return 'Nasi Goreng';
        }

        function getDefaultMenuImage(category) {
            switch (category) {
                case 'Nasi Campur':
                    return '../assets/ayam-masak-merah.jpg';
                case 'Aneka Mee':
                    return '../assets/mee-goreng.jpg';
                case 'Minuman':
                    return '../assets/teh-tarik.jpg';
                default:
                    return '../assets/nasi-goreng-kampung.jpg';
            }
        }

        function getMenuItems() {
            const saved = localStorage.getItem(MENU_KEY);
            const defaultMenu = [
                { name: 'Ayam Masak Merah', price: 4.00, description: 'Spicy red chicken dish with rice.', category: 'Nasi Campur', image: '../assets/ayam-masak-merah.jpg' },
                { name: 'Ayam Kunyit', price: 4.00, description: 'Turmeric chicken served with rice.', category: 'Nasi Campur', image: '../assets/ayam-kunyit.jpg' },
                { name: 'Tomyam', price: 6.00, description: 'Aromatic tomyam with vegetables.', category: 'Nasi Campur', image: '../assets/tomyam.jpg' },
                { name: 'Ayam Kicap', price: 4.00, description: 'Soy sauce chicken served hot.', category: 'Nasi Campur', image: '../assets/ayam-kicap.jpg' }
            ];

            if (!saved) {
                localStorage.setItem(MENU_KEY, JSON.stringify(defaultMenu));
                return defaultMenu;
            }

            try {
                const parsed = JSON.parse(saved);
                if (!Array.isArray(parsed) || !parsed.length) {
                    return defaultMenu;
                }

                return parsed
                    .filter((item) => (item.category || inferMenuCategory(item.name)) === CATEGORY)
                    .map((item) => ({
                        ...item,
                        category: item.category || inferMenuCategory(item.name),
                        image: item.image || getDefaultMenuImage(item.category || inferMenuCategory(item.name))
                    }));
            } catch (error) {
                console.error('Unable to parse menu items', error);
                return defaultMenu;
            }
        }

        function renderMenuItems() {
            const menuItems = getMenuItems();
            const container = document.getElementById('menu-grid');
            if (!container) return;

            if (!menuItems.length) {
                container.innerHTML = '<p class="empty-cart">No items available for this category yet.</p>';
                return;
            }

            container.innerHTML = menuItems.map((item) => `
                <div class="menu-card">
                    <img src="${item.image}" alt="${item.name}" class="card-img" onerror="this.src='../assets/ayam-masak-merah.jpg'">
                    <div class="card-text">
                        <h4>${item.name}</h4>
                        <p>${item.description || 'Freshly prepared.'}</p>
                        <p>RM${Number(item.price).toFixed(2)}</p>
                    </div>
                    <button class="add-btn" onclick="addToCart('${item.name}', ${Number(item.price)})">+</button>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            const cart = getCart();
            const existing = cart.find(item => item.name === name);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ name, price, quantity: 1 });
            }
            saveCart(cart);

            const cartCount = document.getElementById('cart-count');
            if (cartCount) {
                cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            }

            alert(`${name} added to cart.`);
        }

        window.addEventListener('load', () => {
            renderMenuItems();
            const cart = getCart();
            const cartCount = document.getElementById('cart-count');
            if (cartCount) {
                cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            }
        });
    </script>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.querySelector('.sidebar');

        if (menuToggle && sidebar) {
            menuToggle.addEventListener('click', (e) => {
                sidebar.classList.toggle('active');
                e.stopPropagation();
            });

            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                }
            });
        }
    </script>
</body>
</html>
