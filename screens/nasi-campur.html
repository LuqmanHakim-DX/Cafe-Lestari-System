<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasi Campur - Lestari Cafe</title>
    <!-- CSS di luar folder screens -->
    <link rel="stylesheet" href="../stylesheet.css">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="home-header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h1 class="logo-text">Lestari Cafe</h1>
        <div class="header-icons">
    <a href="checkout.html" class="icon-button">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count" class="cart-badge">0</span>
    </a>
    <i class="fas fa-user" onclick="window.location.href='profile.html'"></i>
</div>
    </header>

    <div class="content-container">
        <div class="nav-section">
            <h2>Nasi Campur</h2>
            <p>Pilih lauk kegemaran anda</p>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
    <!-- Ayam Masak Merah -->
    <div class="menu-card">
        <img src="../assets/ayam-masak-merah.jpg" alt="Ayam Masak Merah" class="card-img">
        <div class="card-text">
            <h4>Ayam Masak Merah</h4>
            <p>RM4.00</p>
        </div>
        <button class="add-btn" onclick="addToCart('Ayam Masak Merah', 4.00)">+</button>
    </div>

    <!-- Ayam Kunyit -->
    <div class="menu-card">
        <img src="../assets/ayam-kunyit.jpg" alt="Ayam Kunyit" class="card-img">
        <div class="card-text">
            <h4>Ayam Kunyit</h4>
            <p>RM4.00</p>
        </div>
        <button class="add-btn" onclick="addToCart('Ayam Kunyit', 4.00)">+</button>
    </div>

    <!-- Tomyam -->
    <div class="menu-card">
        <img src="../assets/tomyam.jpg" alt="Tomyam" class="card-img">
        <div class="card-text">
            <h4>Tomyam</h4>
            <p>RM6.00</p>
        </div>
        <button class="add-btn" onclick="addToCart('Tomyam', 6.00)">+</button>
    </div>

    <!-- Ayam Kicap -->
    <div class="menu-card">
        <img src="../assets/ayam-kicap.jpg" alt="Ayam Kicap" class="card-img">
        <div class="card-text">
            <h4>Ayam Kicap</h4>
            <p>RM4.00</p>
        </div>
        <button class="add-btn" onclick="addToCart('Ayam Kicap', 4.00)">+</button>
    </div>
</div>

        </div>
    </div>
  <script>
        const CART_KEY = 'lestariCart';

        function getCart() {
            const saved = localStorage.getItem(CART_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }

        function addToCart(name, price) {
            const cart = getCart();
            const existing = cart.find(item => item.name === name);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ name, price, quantity: 1 });
            }
            saveCart(cart);

            const cartCount = document.getElementById('cart-count');
            if (cartCount) {
                cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            }

            alert(`${name} added to cart.`);
        }

        window.addEventListener('load', () => {
            const cart = getCart();
            const cartCount = document.getElementById('cart-count');
            if (cartCount) {
                cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            }
        });
    </script>
</body>
</html>
