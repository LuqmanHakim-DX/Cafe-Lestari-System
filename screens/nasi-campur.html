<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasi Campur - Lestari Cafe</title>
    <!-- CSS di luar folder screens -->
    <link rel="stylesheet" href="../stylesheet.css">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="home-header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h1 class="logo-text">Lestari Cafe</h1>
        <div class="header-icons">
            <i class="fas fa-shopping-cart"></i>
            <i class="fas fa-user"></i>
        </div>
    </header>

    <div class="content-container">
        <div class="nav-section">
            <h2>Nasi Campur</h2>
            <p>Pilih lauk kegemaran anda</p>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
    <!-- Ayam Masak Merah -->
    <div class="menu-card">
        <img src="../assets/ayam-masak-merah.jpg" alt="Ayam Masak Merah" class="card-img">
        <div class="card-text">
            <h4>Ayam Masak Merah</h4>
            <p>RM4.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Ayam Kunyit -->
    <div class="menu-card">
        <img src="../assets/ayam-kunyit.jpg" alt="Ayam Kunyit" class="card-img">
        <div class="card-text">
            <h4>Ayam Kunyit</h4>
            <p>RM4.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Tomyam -->
    <div class="menu-card">
        <img src="../assets/tomyam.jpg" alt="Tomyam" class="card-img">
        <div class="card-text">
            <h4>Tomyam</h4>
            <p>RM6.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Ayam Kicap -->
    <div class="menu-card">
        <img src="../assets/ayam-kicap.jpg" alt="Ayam Kicap" class="card-img">
        <div class="card-text">
            <h4>Ayam Kicap</h4>
            <p>RM4.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>
</div>

        </div>
    </div>

</body>
</html>
