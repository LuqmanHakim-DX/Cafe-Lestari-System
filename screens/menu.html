<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Lestari Cafe</title>
    <link rel="stylesheet" href="..\/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="homepage-body">

    <header class="page-header">
        <i class="fas fa-chevron-left" onclick="window.location.href='homepage.html'"></i>
        <h1>Menu</h1>
        <div class="header-icons">
            <i class="fas fa-home" onclick="window.location.href='homepage.html'"></i>
            <a href="checkout.html" class="icon-button">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="cart-badge">0</span>
            </a>
            <i class="fas fa-user" onclick="window.location.href='profile.html'"></i>
        </div>
    </header>

    <div class="page-content">
        <section class="menu-actions">
            <button class="order-now-btn" onclick="window.location.href='checkout.html'">View Cart</button>
        </section>

        <section class="menu-section">
            <h2>Best Sellers</h2>
            <div id="menu-grid" class="menu-grid"></div>
        </section>
    </div>

    <script>
        const CART_KEY = 'lestariCart';
        const MENU_KEY = 'lestariMenuItems';

        function getCart() {
            const saved = localStorage.getItem(CART_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }

        function getMenuItems() {
            const saved = localStorage.getItem(MENU_KEY);
            if (!saved) {
                const defaultMenu = [
                    { name: 'Nasi Goreng Kampung', price: 5.00, description: 'Fried rice with egg, chicken, and sambal.' },
                    { name: 'Mee Goreng', price: 4.00, description: 'Classic stir-fried noodles with vegetables.' },
                    { name: 'Nasi Lemak', price: 4.50, description: 'Coconut rice served with sambal and egg.' },
                    { name: 'Teh Tarik', price: 2.50, description: 'Creamy milk tea pulled to perfection.' }
                ];
                localStorage.setItem(MENU_KEY, JSON.stringify(defaultMenu));
                return defaultMenu;
            }

            try {
                const parsed = JSON.parse(saved);
                return Array.isArray(parsed) && parsed.length ? parsed : [];
            } catch (error) {
                console.error('Unable to parse menu items', error);
                return [];
            }
        }

        function renderMenuItems() {
            const menuItems = getMenuItems();
            const container = document.getElementById('menu-grid');
            if (!container) return;

            if (!menuItems.length) {
                container.innerHTML = '<p class="empty-cart">No menu items available right now.</p>';
                return;
            }

            container.innerHTML = menuItems.map((item) => `
                <article class="menu-card">
                    <div>
                        <h3>${item.name}</h3>
                        <p>${item.description || 'Freshly prepared at Lestari Cafe.'}</p>
                    </div>
                    <div class="menu-card-footer">
                        <span>RM${Number(item.price).toFixed(2)}</span>
                        <button class="add-btn" onclick="addToCart('${item.name}', ${Number(item.price)})">Add</button>
                    </div>
                </article>
            `).join('');
        }

        function updateCount() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        function addToCart(name, price) {
            const cart = getCart();
            const existing = cart.find(item => item.name === name);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ name, price, quantity: 1 });
            }
            saveCart(cart);
            updateCount();
            alert(`${name} added to cart.`);
        }

        window.addEventListener('load', () => {
            renderMenuItems();
            updateCount();
        });
    </script>

</body>
</html>
