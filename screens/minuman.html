<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aneka Mee - Lestari Cafe</title>
    <!-- CSS di luar folder screens -->
    <link rel="stylesheet" href="../stylesheet.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#d97b29">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="home-header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h1 class="logo-text">Lestari Cafe</h1>
       <div class="header-icons">
    <a href="checkout.html" class="icon-button">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count" class="cart-badge">0</span>
    </a>
    <i class="fas fa-user" onclick="window.location.href='profile.html'"></i>
</div>
    </header>

    <div class="content-container">
        <div class="nav-section">
            <h2>Minuman</h2>
            <p>Pilih minuman kegemaran anda</p>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
    <!-- Teh-o-ais -->
    <div class="menu-card">
        <img src="../assets/teh-o-ais.jpg" alt="Teh-o-ais" class="card-img">
        <div class="card-text">
            <h4>Teh-o-ais</h4>
            <p>RM1.00</p>
        </div>
        <button class="add-btn" onclick="addToCart('Teh-o-ais', 1.00)">+</button>
    </div>

    <!-- Kopi O Ais -->
    <div class="menu-card">
        <img src="../assets/kopi-o-ais.jpg" alt="Kopi O Ais" class="card-img">
        <div class="card-text">
            <h4>Kopi O Ais</h4>
            <p>RM2.00</p>
        </div>
        <button class="add-btn" onclick="addToCart('Kopi O Ais', 2.00)">+</button>
    </div>

    <!-- Teh Ais -->
    <div class="menu-card">
        <img src="../assets/teh-ais.jpg" alt="Teh Ais" class="card-img">
        <div class="card-text">
            <h4>Teh Ais</h4>
            <p>RM3.00</p>
        </div>
        <button class="add-btn" onclick="addToCart('Teh Ais', 3.00)">+</button>
    </div>

    <!-- Milo Ais -->
    <div class="menu-card">
        <img src="../assets/milo-ais.jpg" alt="Milo Ais" class="card-img">
        <div class="card-text">
            <h4>Milo Ais</h4>
            <p>RM3.00</p>
        </div>
        <button class="add-btn" onclick="addToCart('Milo Ais', 3.00)">+</button>
    </div>
</div>

        </div>
    </div>
<script>
        const CART_KEY = 'lestariCart';

        function getCart() {
            const saved = localStorage.getItem(CART_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }

        function addToCart(name, price) {
            const cart = getCart();
            const existing = cart.find(item => item.name === name);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ name, price, quantity: 1 });
            }
            saveCart(cart);

            const cartCount = document.getElementById('cart-count');
            if (cartCount) {
                cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            }

            alert(`${name} added to cart.`);
        }

        window.addEventListener('load', () => {
            const cart = getCart();
            const cartCount = document.getElementById('cart-count');
            if (cartCount) {
                cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            }
        });
    </script>
</body>
</html>
