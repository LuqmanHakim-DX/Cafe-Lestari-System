<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aneka Mee - Lestari Cafe</title>
    <!-- CSS di luar folder screens -->
    <link rel="stylesheet" href="../stylesheet.css">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="home-header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h1 class="logo-text">Lestari Cafe</h1>
        <div class="header-icons">
            <i class="fas fa-shopping-cart"></i>
            <i class="fas fa-user"></i>
        </div>
    </header>

    <div class="content-container">
        <div class="nav-section">
            <h2>Minuman</h2>
            <p>Pilih minuman kegemaran anda</p>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
    <!-- Teh-o-ais -->
    <div class="menu-card">
        <img src="../assets/teh-o-ais.jpg" alt="Teh-o-ais" class="card-img">
        <div class="card-text">
            <h4>Teh-o-ais</h4>
            <p>RM1.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Kopi O Ais -->
    <div class="menu-card">
        <img src="../assets/kopi-o-ais.jpg" alt="Kopi O Ais" class="card-img">
        <div class="card-text">
            <h4>Kopi O Ais</h4>
            <p>RM2.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Teh Ais -->
    <div class="menu-card">
        <img src="../assets/teh-ais.jpg" alt="Teh Ais" class="card-img">
        <div class="card-text">
            <h4>Teh Ais</h4>
            <p>RM3.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Milo Ais -->
    <div class="menu-card">
        <img src="../assets/milo-ais.jpg" alt="Milo Ais" class="card-img">
        <div class="card-text">
            <h4>Milo Ais</h4>
            <p>RM3.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>
</div>

        </div>
    </div>

</body>
</html>
