<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Lestari Cafe</title>
    <link rel="stylesheet" href="..\/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="homepage-body">

    <header class="home-header">
        <i class="fas fa-bars"></i>
        <h1 class="logo-text">Lestari Cafe</h1>
        <div class="header-icons">
            <a href="checkout.html" class="icon-button"><i class="fas fa-shopping-cart"></i></a>
            <a href="profile.html" class="icon-button"><i class="fas fa-user"></i></a>
        </div>
    </header>

    <div class="home-container">
        <div class="hero-banner">
            <div class="menu-highlight">
                <h3>DISCOVER OUR SPECIAL MENU</h3>
                <button class="order-now-btn" onclick="window.location.href='menu.html'">Order now</button>
            </div>
        </div>

        <div class="home-grid">
            <section class="quick-order">
                <h3>QUICK ORDER</h3>
                <div class="menu-list">
                    <a class="menu-item" href="menu.html">Nasi Campur <span>></span></a>
                    <a class="menu-item" href="menu.html">Nasi Goreng <span>></span></a>
                    <a class="menu-item" href="menu.html">Aneka Mee <span>></span></a>
                    <a class="menu-item" href="menu.html">Minuman <span>></span></a>
                </div>
            </section>

            <section class="customer-favorite">
                <h3>CUSTOMER FAVORITE</h3>
                <div class="fav-items">
                    <div class="fav-card">Nasi Goreng Kampung<br><span>RM5.00</span></div>
                    <div class="fav-card">Mee Goreng<br><span>RM4.00</span></div>
                    <div class="fav-card">Nasi Lemak<br><span>RM4.50</span></div>
                </div>
            </section>
        </div>
    </div>

</body>
</html>
