<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Lestari Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../stylesheet.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#d97b29">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="homepage-body">

    <div class="sidebar">
        <h3 class="sidebar-title">menu</h3>
        <nav class="nav-links">
            <a href="homepage.html" class="nav-item">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="menu.html" class="nav-item">
                <i class="fas fa-utensils"></i> Menu
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i> Profile
            </a>
            <a href="settings.html" class="nav-item active">
                <i class="fas fa-cog"></i> Settings
            </a>
            <a href="help.html" class="nav-item">
                <i class="fas fa-question-circle"></i> Help
            </a>
            <hr>
            <a href="login.html" class="nav-item logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </div>

    <header class="page-header">
        <i class="fas fa-bars" id="menu-toggle" style="cursor:pointer;"></i>
        <h1>Payment</h1>
        <div class="header-icons">
            <i class="fas fa-home" onclick="window.location.href='homepage.html'"></i>
            <i class="fas fa-user" onclick="window.location.href='profile.html'"></i>
        </div>
    </header>

    <div class="page-content payment-page">
        <div class="payment-container">
            <h2>Payment</h2>
            <p class="payment-subtitle">Choose how you would like to complete this order.</p>

            <div class="payment-methods">
                <button type="button" class="payment-method selected" data-method="card">
                    <div class="payment-method-content">
                        <img src="../assets/visa.svg" alt="Card">
                        <span class="method-label">Card</span>
                    </div>
                </button>
                <button type="button" class="payment-method" data-method="cash">
                    <div class="payment-method-content">
                        <i class="fas fa-money-bill-wave"></i>
                        <span class="method-label">Cash</span>
                    </div>
                </button>
            </div>

            <div id="cash-instructions" class="cash-instructions" hidden>
                Pay at the counter and show your order details to the staff when you arrive.
            </div>

            <div class="payment-details" id="payment-details">
                <div id="card-payment-section" class="card-payment-section">
                    <div class="form-group">
                        <label for="card-number">Card Number</label>
                        <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19">
                    </div>
                    <div class="payment-row">
                        <div class="form-group small-field">
                            <label for="expiry-date">Expiry Date</label>
                            <input type="text" id="expiry-date" placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="form-group small-field">
                            <label for="cvv">CVV</label>
                            <input type="password" id="cvv" placeholder="***" maxlength="4">
                        </div>
                    </div>
                </div>
                <div class="payment-summary">
                    <span>Total</span>
                    <strong id="payment-total">RM0.00</strong>
                </div>
                <button class="order-now-btn" id="confirm-payment-btn">Confirm Payment</button>
                <p id="payment-message" class="payment-message"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { buildOrderRecord, persistOrder, downloadOrderDetails, formatCurrency } from './order-utils.js';

        const CART_KEY = 'lestariCart';

        function getCart() {
            const saved = localStorage.getItem(CART_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function calculateTotal(cart) {
            return cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        }

        function updateTotal() {
            const cart = getCart();
            const total = calculateTotal(cart);
            document.getElementById('payment-total').textContent = formatCurrency(total);
            return total;
        }

        function validateCardInputs() {
            const cardNumber = document.getElementById('card-number').value.trim();
            const expiryDate = document.getElementById('expiry-date').value.trim();
            const cvv = document.getElementById('cvv').value.trim();

            const cardNumberValid = /^\d{4}\s?\d{4}\s?\d{4}\s?\d{4}$/.test(cardNumber);
            const expiryValid = /^(0[1-9]|1[0-2])\/(\d{2})$/.test(expiryDate);
            const cvvValid = /^\d{3,4}$/.test(cvv);

            return { cardNumberValid, expiryValid, cvvValid };
        }

        const paymentMethodButtons = document.querySelectorAll('.payment-method');
        const cardPaymentSection = document.getElementById('card-payment-section');
        const cashInstructions = document.getElementById('cash-instructions');
        const confirmPaymentButton = document.getElementById('confirm-payment-btn');
        let selectedPaymentMethod = 'card';

        function setPaymentMethod(method) {
            selectedPaymentMethod = method;
            paymentMethodButtons.forEach((button) => {
                button.classList.toggle('selected', button.dataset.method === method);
            });

            cardPaymentSection.hidden = method !== 'card';
            cashInstructions.hidden = method === 'card';
            confirmPaymentButton.textContent = method === 'cash' ? 'Place Order' : 'Confirm Payment';
        }

        paymentMethodButtons.forEach((button) => {
            button.addEventListener('click', () => {
                setPaymentMethod(button.dataset.method);
            });
        });

        setPaymentMethod(selectedPaymentMethod);

        confirmPaymentButton.addEventListener('click', () => {
            const cart = getCart();
            const message = document.getElementById('payment-message');

            if (cart.length === 0) {
                message.textContent = 'Your cart is empty. Add items and try again.';
                message.style.color = '#e63946';
                return;
            }

            if (selectedPaymentMethod === 'card') {
                const validation = validateCardInputs();
                if (!validation.cardNumberValid || !validation.expiryValid || !validation.cvvValid) {
                    message.textContent = 'Please enter valid card details.';
                    message.style.color = '#e63946';
                    return;
                }
            }

            const customerName = localStorage.getItem('customerName') || 'Guest';
            const customerEmail = localStorage.getItem('customerEmail') || 'guest@example.com';
            const paymentLabel = selectedPaymentMethod === 'cash' ? 'Cash' : 'Visa';
            const orderStatus = selectedPaymentMethod === 'cash' ? 'Awaiting Counter Payment' : 'Paid';
            const order = persistOrder(buildOrderRecord(cart, paymentLabel, customerName, customerEmail, orderStatus));
            localStorage.removeItem(CART_KEY);
            const isCash = selectedPaymentMethod === 'cash';
            message.innerHTML = `${isCash ? 'Your order is waiting for counter payment. Please show the details below.' : 'Payment successful! Your receipt is ready.'} <button id="download-receipt-btn" style="margin-left:8px; padding:6px 10px; border:none; border-radius:6px; cursor:pointer; background:${isCash ? '#d97b29' : '#2a9d8f'}; color:white;">Download Details</button>`;
            message.style.color = isCash ? '#d97b29' : '#2a9d8f';

            document.getElementById('download-receipt-btn').addEventListener('click', () => {
                downloadOrderDetails(order);
            });

            setTimeout(() => {
                window.location.href = 'homepage.html';
            }, 2000);
        });

        window.addEventListener('load', () => {
            updateTotal();
        });
    </script>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.querySelector('.sidebar');

        if (menuToggle && sidebar) {
            menuToggle.addEventListener('click', (e) => {
                sidebar.classList.toggle('active');
                e.stopPropagation();
            });

            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                }
            });
        }
    </script>
</body>
</html>
