<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasi Goreng - Lestari Cafe</title>
    <!-- CSS di luar folder screens -->
    <link rel="stylesheet" href="../stylesheet.css">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="home-header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h1 class="logo-text">Lestari Cafe</h1>
        <div class="header-icons">
            <i class="fas fa-shopping-cart"></i>
            <i class="fas fa-user"></i>
        </div>
    </header>

    <div class="content-container">
        <div class="nav-section">
            <h2>Nasi Goreng</h2>
            <p>Pilih lauk kegemaran anda</p>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
    <!-- Nasi Goreng Kampung -->
    <div class="menu-card">
        <img src="../assets/nasi-goreng-kampung.jpg" alt="Nasi Goreng Kampung" class="card-img">
        <div class="card-text">
            <h4>Nasi Goreng Kampung</h4>
            <p>RM5.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Nasi Goreng USA -->
    <div class="menu-card">
        <img src="../assets/nasi-goreng-usa.jpg" alt="Nasi Goreng USA" class="card-img">
        <div class="card-text">
            <h4>Nasi Goreng USA</h4>
            <p>RM7.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Nasi Goreng Pattaya -->
    <div class="menu-card">
        <img src="../assets/nasi-goreng-pattaya.jpg" alt="Nasi Goreng Pattaya" class="card-img">
        <div class="card-text">
            <h4>Nasi Goreng Pattaya</h4>
            <p>RM6.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>

    <!-- Nasi Goreng Tomyam -->
    <div class="menu-card">
        <img src="../assets/nasi-goreng-tomyam.jpg" alt="Nasi Goreng Tomyam" class="card-img">
        <div class="card-text">
            <h4>Nasi Goreng Tomyam</h4>
            <p>RM6.00</p>
        </div>
        <button class="add-btn">+</button>
    </div>
</div>

        </div>
    </div>

</body>
</html>
